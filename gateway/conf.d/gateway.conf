server {
    listen 8198;
    server_name localhost;

    location ~* \.(css|js|png|jpg|jpeg|gif|ico)$ {
        root /usr/share/nginx/html;
    }

    location = / {
        auth_basic "Management Console";
        auth_basic_user_file /etc/nginx/.htpasswd;

        root /usr/share/nginx/html;
        try_files /main.html =404;
    }

    location /main.html {
        auth_basic "Management Console";
        auth_basic_user_file /etc/nginx/.htpasswd;
        root /usr/share/nginx/html;
    }

    location = /enable {
        auth_basic "Management Console";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_method POST;

        proxy_set_header X-Remote-User $remote_user;
        proxy_pass http://127.0.0.1:5000/enable;
    }

    location = /logout {
        auth_basic "Management Console";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://127.0.0.1:5000/logout;
        proxy_set_header Host $host;
        proxy_set_header X-Remote-User $remote_user;
    }

    location = /switch {
        auth_basic "Management Console";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_method POST;
        proxy_set_header X-Remote-User $remote_user;
        proxy_pass http://127.0.0.1:5000/switch;
    }

    location = /discard {
        auth_basic "Management Console";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_method POST;
        proxy_set_header X-Remote-User $remote_user;
        proxy_pass http://127.0.0.1:5000/discard;
    }

    location = /api/reset {
        proxy_pass http://api_backend/reset;
    }

    location /monitoring/ {
        proxy_pass http://monitoring:8400/;
    }

    location /api/ {
        proxy_set_header Host $host;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://api_backend;
    }
}


server {
    listen 8199;
    server_name localhost;

    location = /_validate_jwt {
        internal;
        proxy_pass http://127.0.0.1:5000/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
    }

    location / {
        auth_request /_validate_jwt;
        proxy_pass http://api_backend;
    }
}
