<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f5; text-align: center; padding-top: 80px; }
        .box { display: inline-block; background: white; padding: 20px 30px; border-radius: 8px; border: 1px solid #ddd; }
        a.button { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #0078d7; color: white; text-decoration: none; border-radius: 4px; }
        a.button:hover { background: #005fa3; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Management Console</h2>
        <p>You must authenticate to continue.</p>

        <a class="button" href="/main.html">Enter Console</a>

        <p style="margin-top: 20px; font-size: 12px; color: #888;">
            The browser will ask for username and password.
        </p>
    </div>
</body>
</html>
