stages:
  - build
  - test
  - package
  - smoketest
  - deploy

variables:
  DOCKER_TLS_CERTDIR: ""
  IMAGE_TAG: "$CI_COMMIT_REF_NAME"

default:
  image: docker:27.1.2
  services:
    - name: docker:27.1.2-dind
      command: ["--tls=false"]

before_script:
  - if [ -n "$SSH_PRIVKEY_B64" ]; then echo "$SSH_PRIVKEY_B64" | base64 -d > id_rsa && chmod 600 id_rsa; fi
  - docker info || true

build:
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH == "project1.0" || $CI_COMMIT_BRANCH == "project1.1"'
  script:
    - mkdir -p build_artifacts
    - cp -r gateway Service1 Service2 Storage monitoring ./build_artifacts/ || true
    - if [ -f docker-compose.yaml ]; then cp docker-compose.yaml build_artifacts/docker-compose.yaml; fi
  artifacts:
    paths:
      - build_artifacts/
    expire_in: 1 hour

test:
  stage: test
  needs:
    - job: build
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "project1.0" || $CI_COMMIT_BRANCH == "project1.1"'
  image: bash:5.2
  script:
    - echo "=== Running minimal test for branch $CI_COMMIT_BRANCH ==="
    - cd build_artifacts || exit 1
    - echo "Checking that build_artifacts directory exists..."
    - if [ ! -d . ]; then echo "Build artifacts missing!"; exit 1; fi
    - echo "Minimal test passed."
  after_script:
    - echo "Cleaning test artifacts..."
    - docker system prune -f || true
    - docker builder prune -f || true
    - git clean -ffdx || true
  artifacts:
    paths:
      - build_artifacts/
    expire_in: 1 hour

package:
  stage: package
  needs:
    - job: test
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "project1.0" || $CI_COMMIT_BRANCH == "project1.1"'
  variables:
    DOCKER_HOST: "tcp://docker:2375"
  script:
    - echo "$HARBOR_PASS" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin
    - |
      if [ "$CI_COMMIT_BRANCH" = "project1.0" ]; then
        docker build -t "$HARBOR_REGISTRY/$HARBOR_PROJECT/api_v1:$IMAGE_TAG" build_artifacts/Service1
        docker push "$HARBOR_REGISTRY/$HARBOR_PROJECT/api_v1:$IMAGE_TAG"
      fi
      if [ "$CI_COMMIT_BRANCH" = "project1.1" ]; then
        docker build -t "$HARBOR_REGISTRY/$HARBOR_PROJECT/api_v2:$IMAGE_TAG" build_artifacts/Service1
        docker push "$HARBOR_REGISTRY/$HARBOR_PROJECT/api_v2:$IMAGE_TAG"
      fi
    - docker build -t "$HARBOR_REGISTRY/$HARBOR_PROJECT/gateway:$IMAGE_TAG" build_artifacts/gateway
    - docker build -t "$HARBOR_REGISTRY/$HARBOR_PROJECT/service2:$IMAGE_TAG" build_artifacts/Service2
    - docker build -t "$HARBOR_REGISTRY/$HARBOR_PROJECT/storage:$IMAGE_TAG" build_artifacts/Storage
    - docker build -t "$HARBOR_REGISTRY/$HARBOR_PROJECT/monitoring:$IMAGE_TAG" build_artifacts/monitoring
    - |
      for svc in gateway service2 storage monitoring; do
        docker push "$HARBOR_REGISTRY/$HARBOR_PROJECT/$svc:$IMAGE_TAG"
      done
  after_script:
    - |
      for svc in gateway api_v1 api_v2 service2 storage monitoring; do
        docker rmi "$HARBOR_REGISTRY/$HARBOR_PROJECT/$svc:$IMAGE_TAG" || true
      done
    - docker image prune -f || true
    - docker builder prune -f || true
  artifacts:
    paths:
      - build_artifacts/
    expire_in: 1 hour

smoketest:
  stage: smoketest
  needs:
    - job: package
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "project1.0" || $CI_COMMIT_BRANCH == "project1.1"'

  image: alpine:3.20
  services:
    - name: docker:27.1.2-dind
      command: ["--tls=false"]

  variables:
    DOCKER_HOST: "tcp://docker:2375"

  before_script:
    - apk add --no-cache docker-cli docker-compose curl bash
    - echo "$HARBOR_PASS" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin
    - echo "Waiting for Docker..."
    - for i in $(seq 1 30); do docker info >/dev/null 2>&1 && break || sleep 1; done

  script:
    - echo "=== SMOKETEST START ===" | tee smoketest.log
    - test -f build_artifacts/docker-compose.yaml

    - echo "=== Pulling images ===" | tee -a smoketest.log
    - docker-compose -f build_artifacts/docker-compose.yaml pull | tee -a smoketest.log

    - echo "=== Starting containers ===" | tee -a smoketest.log
    - docker-compose -f build_artifacts/docker-compose.yaml up -d | tee -a smoketest.log

    - sleep 6

    - echo "=== Curl tests ===" | tee -a smoketest.log
    - curl -k -s https://localhost:8198 >> smoketest.log || true
    - curl -k -s https://localhost:8199/status >> smoketest.log || true

    - docker ps >> smoketest.log

    - echo "=== SMOKETEST OK ===" | tee -a smoketest.log

  after_script:
    - docker-compose -f build_artifacts/docker-compose.yaml down || true
    - docker image prune -f || true

  artifacts:
    paths:
      - smoketest.log
    when: always
    expire_in: 1 hour


deploy:
  stage: deploy
  needs:
    - job: smoketest
    - job: package
      artifacts: true
  image: alpine:3.20
  services: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "project1.0" || $CI_COMMIT_BRANCH == "project1.1"'

  before_script:
    - apk add --no-cache openssh-client rsync bash curl sudo
    - if [ -n "$SSH_PRIVKEY_B64" ]; then echo "$SSH_PRIVKEY_B64" | base64 -d > id_rsa && chmod 600 id_rsa; fi

  script:
    - test -f build_artifacts/docker-compose.yaml
    - rsync -e "ssh -i id_rsa -o StrictHostKeyChecking=no" build_artifacts/docker-compose.yaml "$SERVER_USER@$SERVER_IP:~/docker-compose.yaml"

    - |
      ssh -o StrictHostKeyChecking=no -i id_rsa "$SERVER_USER@$SERVER_IP" \
        "HARBOR_REGISTRY='$HARBOR_REGISTRY' \
         HARBOR_PROJECT='$HARBOR_PROJECT' \
         HARBOR_USER='$HARBOR_USER' \
         HARBOR_PASS='$HARBOR_PASS' \
         IMAGE_TAG='$IMAGE_TAG' \
         CI_COMMIT_BRANCH='$CI_COMMIT_BRANCH' \
         bash -s" <<'REMOTE_EOF'
        set -euo pipefail

        echo "=== remote: starting deploy script ==="

        sudo -n true || { echo "ERROR: sudo requires password"; exit 1; }

        : "${HARBOR_REGISTRY:?}"
        : "${HARBOR_PROJECT:?}"
        : "${HARBOR_USER:?}"
        : "${HARBOR_PASS:?}"
        : "${IMAGE_TAG:?}"
        : "${CI_COMMIT_BRANCH:?}"

        if ! command -v docker >/dev/null 2>&1; then
          echo "docker not found, installing..."
          curl -fsSL https://get.docker.com | sh
        fi

        if ! sudo docker compose version >/dev/null 2>&1; then
          echo "docker compose not found, installing..."
          sudo mkdir -p /usr/local/lib/docker/cli-plugins
          sudo curl -SL https://github.com/docker/compose/releases/download/v2.29.2/docker-compose-linux-x86_64 \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
        fi

        echo "$HARBOR_PASS" | sudo docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin

        pull_image() {
          img="$1"
          echo "Pulling $img"
          sudo docker pull "$img"
        }

        for svc in gateway service2 storage monitoring; do
          pull_image "$HARBOR_REGISTRY/$HARBOR_PROJECT/$svc:$IMAGE_TAG"
        done

        if [ "$CI_COMMIT_BRANCH" = "project1.0" ]; then
          pull_image "$HARBOR_REGISTRY/$HARBOR_PROJECT/api_v1:$IMAGE_TAG"
        elif [ "$CI_COMMIT_BRANCH" = "project1.1" ]; then
          pull_image "$HARBOR_REGISTRY/$HARBOR_PROJECT/api_v2:$IMAGE_TAG"
        fi

        echo "Starting docker compose..."
        sudo -E docker compose -f ~/docker-compose.yaml up -d

        echo "=== remote: deploy finished ==="
      REMOTE_EOF
